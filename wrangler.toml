# Cloudflare Pages Configuration
# Deploy this project to Cloudflare Pages using GitHub integration

name = "cloud-api"
compatibility_date = "2024-01-01"

# No build command needed - JAR is pre-built by GitHub Actions
# See .github/workflows/build-and-deploy.yml for build process

# Environment variables for production deployment
[env.production]
vars = { SERVER_PORT = "8080", ENVIRONMENT = "production", LOG_LEVEL = "INFO" }

# Observability settings
[observability]
enabled = true
