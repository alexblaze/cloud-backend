version: '3.8'

services:
  cloud-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-api
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge
